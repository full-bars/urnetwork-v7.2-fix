name: Build and Push Hub Image

on:
  push:
    branches:
      - main
    paths:
      - 'hub/**'
      - '.github/workflows/hub-build.yml'
    tags:
      - 'hub-v*'
  pull_request:
    branches:
      - main
    paths:
      - 'hub/**'
      - '.github/workflows/hub-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-hub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=match,pattern=hub-v(.*),group=1
            type=ref,event=pr
            type=sha,format=short

      - name: Determine version for build
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/hub-v* ]]; then
            VERSION="${GITHUB_REF_NAME#hub-}"
          else
            VERSION=$(git describe --tags --match 'hub-v*' --abbrev=0 2>/dev/null | sed 's/^hub-//' || true)
            VERSION="${VERSION:-v0.1.0-dev}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push hub image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: hub/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=hub
          cache-to: type=gha,mode=min,scope=hub
